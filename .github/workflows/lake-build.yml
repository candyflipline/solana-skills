name: Lake build (Lean side)

# Runs `bash scripts/check-lake-build.sh --strict` over every bundled
# `examples/*/formal_verification/` project. Heavier than the Rust-side
# gates because it provisions elan + Mathlib (cache-miss can take 15–45
# min). Runs on push-to-main and manual dispatch only — PRs that touch
# Lean codegen should request this workflow via a comment trigger or a
# follow-up commit, not block on every PR.

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  lake-build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Install elan (Lean toolchain manager)
        run: |
          set -euo pipefail
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      # Cache elan's toolchain store. Keyed on every `lean-toolchain`
      # file in the repo so a Lean version bump invalidates cleanly.
      - name: Cache elan toolchains
        uses: actions/cache@v4
        with:
          path: ~/.elan/toolchains
          key: ${{ runner.os }}-elan-${{ hashFiles('**/lean-toolchain') }}
          restore-keys: |
            ${{ runner.os }}-elan-

      # Cache per-example `.lake/` (built oleans + downloaded Mathlib).
      # Keyed on the lakefiles + manifests so dependency or toolchain
      # bumps invalidate the right examples.
      - name: Cache example .lake directories
        uses: actions/cache@v4
        with:
          path: examples/**/formal_verification/.lake
          key: ${{ runner.os }}-lake-${{ hashFiles('examples/**/lakefile.lean', 'examples/**/lake-manifest.json', '**/lean-toolchain') }}
          restore-keys: |
            ${{ runner.os }}-lake-

      # v2.27 — examples that import bundled stdlib (`Token from "spl"`,
      # `Metadata from "metaplex"`) have lakefiles whose `require
      # tokenProofs from "<rel-path>"` directive was rewritten relative
      # to the author's `$HOME` (the bundled proof package is
      # materialized to `~/.qedgen/cache/builtin/<key>/.qed/proofs/`).
      # The relative-path depth depends on how deep the repo is under
      # `$HOME` — committed lakefiles therefore only resolve cleanly on
      # the machine they were generated on. Rebuild qedgen and re-run
      # codegen on each affected example to (a) materialize the bundled
      # proof package into the runner's `$HOME/.qedgen/cache/`, and
      # (b) rewrite the lakefile's require directive with a path that
      # resolves correctly under the runner's path layout.
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
      - name: Build qedgen + regen bundled-stdlib lakefiles
        run: |
          set -euo pipefail
          cargo build --release --bin qedgen
          mkdir -p bin
          cp target/release/qedgen bin/qedgen
          for ex in examples/rust/escrow-split examples/rust/bundled-stdlib-demo; do
            if [ -f "$ex/qed.toml" ]; then
              echo "==> regen lakefile for $ex"
              # Strip any existing `require <pkg>Proofs from "..."` lines
              # AND the v2.27-Track-B preamble comment so codegen's
              # `inject_verified_callee_requires` re-emits them with the
              # CI runner's correct relative path (committed lakefile's
              # path was computed against the author's $HOME depth).
              # The function is idempotent on presence — if we left the
              # stale line in place it would skip the rewrite.
              lakefile="$ex/formal_verification/lakefile.lean"
              if [ -f "$lakefile" ]; then
                sed -i '/^require [a-zA-Z_][a-zA-Z0-9_]*Proofs from /d; /^-- v2\.27 Track B: verified-callee proof package/d' "$lakefile"
              fi
              bin/qedgen codegen --lean --spec "$ex"
            fi
          done

      # Populate `.lake/` for any example whose cache missed. `lake update`
      # is a no-op when the manifest matches; otherwise it fetches Mathlib.
      - name: Bootstrap missing .lake directories
        run: |
          set -euo pipefail
          shopt -s globstar
          for lakefile in examples/**/formal_verification/lakefile.lean; do
            dir="$(dirname "$lakefile")"
            if [ ! -d "$dir/.lake" ] || [ ! -f "$dir/lake-manifest.json" ]; then
              echo "==> lake update in $dir"
              ( cd "$dir" && lake update )
            fi
          done

      - name: Run lake-build sweep
        run: bash scripts/check-lake-build.sh --strict
