name: Release binaries

on:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            asset: qedgen-aarch64-apple-darwin
          - target: x86_64-apple-darwin
            os: macos-latest
            asset: qedgen-x86_64-apple-darwin
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            asset: qedgen-x86_64-unknown-linux-gnu
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            asset: qedgen-aarch64-unknown-linux-gnu

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (arm64 Linux)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      # macOS runners ship Xcode's new ld-prime linker, which trips an
      # assertion on Rust-generated symbol names longer than its internal
      # limit (`name.size() <= maxLength` in `SymbolString.cpp`). The
      # classic Mach-O linker handles them without complaint. Apple has
      # an open bug; until it's fixed in `ld-prime`, every macOS Rust
      # build of qedgen needs `-Wl,-ld_classic`. Non-macOS targets are
      # unaffected.
      - name: Build
        env:
          RUSTFLAGS: ${{ startsWith(matrix.os, 'macos') && '-C link-arg=-Wl,-ld_classic' || '' }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package and checksum
        run: |
          cp target/${{ matrix.target }}/release/qedgen ${{ matrix.asset }}
          chmod +x ${{ matrix.asset }}
          if command -v sha256sum &> /dev/null; then
            sha256sum ${{ matrix.asset }} > ${{ matrix.asset }}.sha256
          else
            shasum -a 256 ${{ matrix.asset }} > ${{ matrix.asset }}.sha256
          fi

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            ${{ matrix.asset }} \
            ${{ matrix.asset }}.sha256
